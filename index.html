<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博天气 · 赛博黄历</title>
<style>
  /* ============================================================
     基础重置
     ============================================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100dvh; }
  body {
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    color: #d8f3ff;
    background: #04050d;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
    line-height: 1.5;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  ::selection { background: rgba(0, 255, 255, 0.35); color: #fff; }

  /* ============================================================
     赛博朋克背景层
     ============================================================ */
  .bg-base {
    position: fixed; inset: 0; z-index: -3;
    background:
      radial-gradient(ellipse 70% 50% at 15% 10%, rgba(255, 0, 170, 0.18), transparent 60%),
      radial-gradient(ellipse 80% 60% at 85% 90%, rgba(0, 240, 255, 0.18), transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(180, 0, 255, 0.10), transparent 70%),
      linear-gradient(180deg, #04050d 0%, #0a0420 50%, #04050d 100%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: -2;
    background-image:
      linear-gradient(rgba(0, 240, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(180deg, transparent 0%, black 20%, black 80%, transparent 100%),
                 radial-gradient(ellipse at center, black 30%, transparent 90%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 20%, black 80%, transparent 100%),
                        radial-gradient(ellipse at center, black 30%, transparent 90%);
    transform: perspective(800px) rotateX(60deg) translateY(20%) scale(2);
    transform-origin: center top;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 0 60px, 60px 0; }
  }
  .bg-scanlines {
    position: fixed; inset: 0; z-index: -1;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 255, 255, 0.02) 0px,
      rgba(0, 255, 255, 0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(100px);
    z-index: -1; opacity: 0.5; pointer-events: none;
  }
  .bg-orb.o1 { width: 500px; height: 500px; background: #ff00aa; top: -150px; left: -150px; animation: orbFloat1 18s ease-in-out infinite; }
  .bg-orb.o2 { width: 450px; height: 450px; background: #00f0ff; bottom: -150px; right: -150px; animation: orbFloat2 22s ease-in-out infinite; }
  .bg-orb.o3 { width: 350px; height: 350px; background: #b400ff; top: 40%; left: 50%; animation: orbFloat3 25s ease-in-out infinite; }
  @keyframes orbFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(80px,60px) scale(1.2); } }
  @keyframes orbFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px,-50px) scale(1.15); } }
  @keyframes orbFloat3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.3); } }

  /* ============================================================
     通用容器
     ============================================================ */
  .container {
    max-width: 1500px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
  }

  /* ============================================================
     顶部 Header
     ============================================================ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    margin-bottom: 28px;
    padding: 18px 24px;
    position: relative;
  }
  .cyber-panel {
    background: linear-gradient(135deg, rgba(10, 14, 36, 0.7), rgba(20, 8, 40, 0.5));
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(0, 240, 255, 0.25);
    border-radius: 4px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
    box-shadow:
      0 0 20px rgba(0, 240, 255, 0.15),
      inset 0 0 20px rgba(0, 240, 255, 0.03);
  }
  .cyber-panel::before, .cyber-panel::after {
    content: ''; position: absolute; width: 12px; height: 12px;
    border: 1px solid #00f0ff;
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
  }
  .cyber-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .cyber-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(255, 0, 170, 0.3), rgba(0, 240, 255, 0.3));
    border: 1px solid #00f0ff;
    position: relative;
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 12px rgba(0, 240, 255, 0.3);
  }
  .brand-mark::before, .brand-mark::after {
    content: ''; position: absolute; width: 6px; height: 6px;
    background: #ff00aa; box-shadow: 0 0 6px #ff00aa;
  }
  .brand-mark::before { top: -3px; left: -3px; }
  .brand-mark::after { bottom: -3px; right: -3px; }
  .brand-mark svg { width: 26px; height: 26px; color: #fff; filter: drop-shadow(0 0 4px #00f0ff); }
  .brand h1 {
    font-family: "Orbitron", "Rajdhani", monospace;
    font-size: 20px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #00f0ff, #ff00aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
  }
  .brand p {
    font-size: 11px; color: #88c4d9; margin-top: 2px;
    letter-spacing: 0.15em; text-transform: uppercase;
    font-family: "Orbitron", monospace;
  }
  .header-status {
    display: flex; align-items: center; gap: 16px;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; font-size: 11px;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #00f0ff;
    background: rgba(0, 240, 255, 0.08);
    border: 1px solid rgba(0, 240, 255, 0.4);
    text-shadow: 0 0 6px #00f0ff;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00f0ff;
    box-shadow: 0 0 8px #00f0ff;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
    70% { box-shadow: 0 0 0 8px rgba(0, 240, 255, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
  }
  .clock {
    font-family: "Orbitron", monospace;
    font-size: 14px; font-weight: 500;
    color: #ff00aa;
    text-shadow: 0 0 8px rgba(255, 0, 170, 0.7);
    letter-spacing: 0.05em;
  }

  /* ============================================================
     工具栏
     ============================================================ */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    margin-bottom: 18px;
    padding: 12px 16px;
    position: relative;
    z-index: 100;
    overflow: visible;
  }
  .toolbar-title {
    display: flex; align-items: center; gap: 10px;
    font-family: "Orbitron", monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: #00f0ff;
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.5);
  }
  .toolbar-title::before {
    content: ''; width: 4px; height: 18px; background: #ff00aa;
    box-shadow: 0 0 8px #ff00aa;
  }
  .toolbar-actions { display: flex; gap: 10px; align-items: center; }
  .toolbar-sub { color: #6b8fa3; font-size: 11px; letter-spacing: 0.1em; }

  /* ===== 搜索框 ===== */
  .toolbar-search {
    position: relative;
    flex: 1; max-width: 320px; min-width: 200px;
    display: flex; align-items: center;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 240, 255, 0.3);
    padding: 0 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .toolbar-search:focus-within {
    border-color: #00f0ff;
    box-shadow: 0 0 16px rgba(0, 240, 255, 0.4), inset 0 0 8px rgba(0, 240, 255, 0.1);
  }
  .search-icon {
    color: #00f0ff; font-size: 16px;
    text-shadow: 0 0 6px #00f0ff;
    margin-right: 6px; font-family: "Orbitron", monospace;
  }
  #citySearch {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-size: 13px; padding: 8px 0;
    font-family: "Orbitron", "PingFang SC", sans-serif;
    letter-spacing: 0.02em;
  }
  #citySearch::placeholder { color: #4a6a7a; }
  .search-clear {
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(255, 0, 170, 0.2); color: #ff00aa;
    font-size: 14px; line-height: 1; cursor: pointer;
    border: 1px solid rgba(255, 0, 170, 0.4);
    transition: all 0.15s;
  }
  .search-clear:hover { background: #ff00aa; color: #04050d; }
  .search-dropdown {
    position: fixed;
    max-height: 360px; overflow-y: auto;
    background: rgba(8, 12, 28, 0.98);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(0, 240, 255, 0.5);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 24px rgba(0, 240, 255, 0.3);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    z-index: 9999;
    display: none;
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 240, 255, 0.4) transparent;
  }
  .search-dropdown::-webkit-scrollbar { width: 6px; }
  .search-dropdown::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.4); }
  .search-dropdown.show { display: block; animation: dropIn 0.2s ease; }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .search-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid rgba(0, 240, 255, 0.08);
    transition: background 0.15s;
  }
  .search-item:hover { background: rgba(0, 240, 255, 0.08); }
  .search-item:last-child { border-bottom: none; }
  .search-item.disabled { opacity: 0.4; cursor: not-allowed; }
  .search-item.disabled:hover { background: transparent; }
  .search-item .si-flag {
    font-size: 9px; padding: 2px 6px;
    background: rgba(0, 240, 255, 0.15);
    color: #67e8f9;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
    border: 1px solid rgba(0, 240, 255, 0.3);
  }
  .search-item .si-info { flex: 1; min-width: 0; }
  .search-item .si-name {
    color: #fff; font-size: 13px; font-weight: 600;
    font-family: "PingFang SC", sans-serif;
  }
  .search-item .si-en {
    color: #6b8fa3; font-size: 10px; margin-left: 6px;
    font-family: "Orbitron", monospace;
  }
  .search-item .si-country {
    color: #88c4d9; font-size: 10px; margin-top: 2px;
    font-family: "PingFang SC", sans-serif;
  }
  .search-item .si-action {
    font-size: 10px; padding: 4px 10px;
    background: rgba(0, 240, 255, 0.12);
    color: #00f0ff;
    border: 1px solid rgba(0, 240, 255, 0.4);
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .search-item.disabled .si-action {
    background: rgba(107, 143, 163, 0.15);
    color: #6b8fa3; border-color: rgba(107, 143, 163, 0.3);
  }
  .search-empty {
    padding: 20px; text-align: center;
    color: #6b8fa3; font-size: 12px;
  }

  /* ===== 模态框 ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(2, 4, 12, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 998;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-panel {
    position: relative;
    width: 100%; max-width: 560px; max-height: calc(100vh - 40px);
    overflow-y: auto;
    background: linear-gradient(160deg, rgba(10, 18, 42, 0.95), rgba(28, 6, 48, 0.9));
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(0, 240, 255, 0.4);
    box-shadow: 0 0 40px rgba(0, 240, 255, 0.3), 0 20px 60px rgba(0, 0, 0, 0.5);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    padding: 28px 30px 24px;
    animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 240, 255, 0.4) transparent;
  }
  .modal-panel::-webkit-scrollbar { width: 6px; }
  .modal-panel::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.4); }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255, 0, 170, 0.1);
    border: 1px solid rgba(255, 0, 170, 0.4);
    color: #ff00aa; font-size: 20px; line-height: 1;
    cursor: pointer; z-index: 2;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover {
    background: #ff00aa; color: #04050d;
    box-shadow: 0 0 16px rgba(255, 0, 170, 0.6);
  }
  .modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-right: 40px; }
  .modal-icon {
    width: 56px; height: 56px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    background: radial-gradient(circle, rgba(0, 240, 255, 0.2), transparent 70%);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
  }
  .modal-title {
    font-size: 20px; font-weight: 600; color: #fff;
    letter-spacing: 0.04em; text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
    font-family: "Orbitron", "PingFang SC", sans-serif;
  }
  .modal-subtitle {
    font-size: 11px; color: #88c4d9; margin-top: 4px;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
  }
  .modal-current {
    display: flex; align-items: baseline; gap: 12px;
    padding: 18px 0; margin-bottom: 16px;
    border-top: 1px dashed rgba(0, 240, 255, 0.2);
    border-bottom: 1px dashed rgba(0, 240, 255, 0.2);
  }
  .modal-temp {
    font-family: "Orbitron", monospace;
    font-size: 56px; font-weight: 300; line-height: 1;
    color: #fff; text-shadow: 0 0 20px rgba(0, 240, 255, 0.7);
  }
  .modal-temp-unit { font-size: 24px; color: #00f0ff; font-weight: 400; }
  .modal-desc { color: #88c4d9; font-size: 13px; margin-left: auto; }
  .modal-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 20px;
  }
  @media (max-width: 480px) { .modal-grid { grid-template-columns: repeat(2, 1fr); } }
  .modal-grid .hud-item { padding: 10px; }
  .modal-section { margin-bottom: 18px; }
  .modal-section-title {
    font-size: 10px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .modal-section-title::before {
    content: ''; width: 4px; height: 14px;
    background: #ff00aa; box-shadow: 0 0 6px #ff00aa;
  }
  .modal-info {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 16px;
    font-size: 12px;
  }
  .modal-info .mi-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px dashed rgba(0, 240, 255, 0.1);
  }
  .modal-info .mi-label { color: #6b8fa3; font-family: "Orbitron", monospace; font-size: 10px; letter-spacing: 0.08em; }
  .modal-info .mi-value { color: #fff; font-weight: 500; }
  .modal-forecast {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  @media (max-width: 480px) { .modal-forecast { grid-template-columns: repeat(4, 1fr); } }
  .mf-day {
    text-align: center; padding: 10px 4px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 240, 255, 0.12);
  }
  .mf-day .mf-date { font-size: 10px; color: #6b8fa3; font-family: "Orbitron", monospace; }
  .mf-day .mf-icon { font-size: 18px; margin: 4px 0; }
  .mf-day .mf-temp { font-size: 11px; color: #fff; font-weight: 600; font-family: "Orbitron", monospace; }
  .mf-day .mf-temp .lo { color: #6b8fa3; font-weight: 400; }
  .modal-actions {
    display: flex; gap: 10px; margin-top: 20px;
    padding-top: 16px; border-top: 1px dashed rgba(0, 240, 255, 0.2);
  }
  .modal-actions .btn { flex: 1; padding: 10px; }

  /* ===== 移除按钮 (卡片右上角) ===== */
  .remove-btn {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255, 0, 170, 0.15);
    border: 1px solid rgba(255, 0, 170, 0.4);
    color: #ff00aa; font-size: 14px; line-height: 1;
    cursor: pointer; z-index: 3;
    opacity: 0; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .city-card:hover .remove-btn { opacity: 1; }
  .remove-btn:hover {
    background: #ff00aa; color: #04050d;
    box-shadow: 0 0 12px rgba(255, 0, 170, 0.6);
  }
  .remove-btn.removing {
    pointer-events: none;
    animation: cardRemove 0.4s ease forwards;
  }
  @keyframes cardRemove {
    to { opacity: 0; transform: scale(0.8); }
  }
  .city-card.added-flash {
    animation: cardAdded 0.6s ease;
  }
  @keyframes cardAdded {
    0% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 40px rgba(0, 240, 255, 0.8); }
    100% { transform: scale(1); opacity: 1; }
  }
  .btn {
    padding: 8px 14px; font-size: 11px;
    font-family: "Orbitron", monospace; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #00f0ff;
    background: rgba(0, 240, 255, 0.06);
    border: 1px solid rgba(0, 240, 255, 0.35);
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }
  .btn:hover {
    color: #04050d;
    background: #00f0ff;
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
  }
  .btn.pink { color: #ff00aa; border-color: rgba(255, 0, 170, 0.35); background: rgba(255, 0, 170, 0.06); }
  .btn.pink:hover { color: #04050d; background: #ff00aa; box-shadow: 0 0 20px rgba(255, 0, 170, 0.6); }
  .btn.active { color: #04050d; background: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }

  /* ============================================================
     城市卡片网格 + 拖拽
     ============================================================ */
  .city-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }
  .city-grid.dragging { cursor: grabbing; }

  /* 卡片本体 */
  .city-card {
    position: relative;
    padding: 16px 18px 18px;
    cursor: grab;
    user-select: none;
    background: linear-gradient(160deg, rgba(10, 18, 42, 0.85), rgba(28, 6, 48, 0.7));
    border: 1px solid rgba(0, 240, 255, 0.3);
    box-shadow:
      0 0 24px rgba(0, 240, 255, 0.12),
      inset 0 0 30px rgba(0, 240, 255, 0.04);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.3s, border-color 0.3s, opacity 0.3s;
    opacity: 0;
    animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .city-card:nth-child(1) { animation-delay: 0.05s; }
  .city-card:nth-child(2) { animation-delay: 0.12s; }
  .city-card:nth-child(3) { animation-delay: 0.19s; }
  .city-card:nth-child(4) { animation-delay: 0.26s; }
  .city-card:nth-child(5) { animation-delay: 0.33s; }
  .city-card:nth-child(6) { animation-delay: 0.40s; }

  /* 卡片四角装饰 */
  .city-card::before, .city-card::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 1px solid #00f0ff;
    box-shadow: 0 0 6px #00f0ff;
    pointer-events: none;
  }
  .city-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .city-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  /* 扫描线纹理 */
  .city-card .scan {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0, 240, 255, 0.04) 2px,
      rgba(0, 240, 255, 0.04) 3px
    );
    pointer-events: none;
    border-radius: 0;
  }

  /* 顶部条带 */
  .city-card .barcode {
    position: absolute; top: 6px; right: 18px;
    display: flex; gap: 2px; height: 4px; opacity: 0.5;
  }
  .city-card .barcode span {
    width: 2px; background: #00f0ff;
    box-shadow: 0 0 4px #00f0ff;
  }
  .city-card .barcode span:nth-child(2n) { width: 1px; }
  .city-card .barcode span:nth-child(3n) { width: 3px; }

  /* Hover */
  .city-card:hover {
    transform: translateY(-3px);
    border-color: rgba(0, 240, 255, 0.6);
    box-shadow:
      0 0 32px rgba(0, 240, 255, 0.3),
      0 8px 24px rgba(0, 0, 0, 0.4),
      inset 0 0 30px rgba(0, 240, 255, 0.06);
  }

  /* 拖拽中 - 全息悬浮 */
  .city-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
    transform: scale(0.98) rotate(-1deg);
  }
  .city-card.drag-over {
    border-color: #ff00aa;
    box-shadow:
      0 0 32px rgba(255, 0, 170, 0.5),
      inset 0 0 30px rgba(255, 0, 170, 0.1);
  }

  /* 拖拽时的幻影 placeholder */
  .drag-ghost {
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    width: 280px;
    padding: 16px 18px 18px;
    background: linear-gradient(160deg, rgba(0, 240, 255, 0.15), rgba(255, 0, 170, 0.15));
    border: 1px solid #00f0ff;
    box-shadow:
      0 0 40px rgba(0, 240, 255, 0.6),
      0 0 60px rgba(255, 0, 170, 0.4),
      inset 0 0 40px rgba(0, 240, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    transform: translate(-50%, -50%) rotate(-2deg) scale(1.05);
    transition: none;
  }
  .drag-ghost::before, .drag-ghost::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    border: 1px solid #ff00aa; box-shadow: 0 0 8px #ff00aa;
  }
  .drag-ghost::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .drag-ghost::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .drag-ghost::after .scan { display: block; }

  /* 卡片头部 */
  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 12px; gap: 10px;
  }
  .card-loc { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .card-loc .name {
    font-size: 15px; font-weight: 600; color: #fff;
    letter-spacing: 0.05em; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
  }
  .card-loc .meta {
    font-size: 10px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
  }
  .card-loc .meta .dot { color: #ff00aa; margin: 0 4px; }
  .drag-handle {
    width: 18px; height: 18px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 2px;
    opacity: 0.4; transition: opacity 0.2s;
  }
  .drag-handle span {
    display: flex; gap: 2px;
  }
  .drag-handle span::before, .drag-handle span::after {
    content: ''; width: 3px; height: 3px; background: #00f0ff;
    box-shadow: 0 0 4px #00f0ff;
  }
  .city-card:hover .drag-handle { opacity: 0.8; }

  /* 主体温度 + HUD 数据 */
  .card-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    align-items: center; margin-bottom: 14px;
  }
  .temp-block {
    display: flex; flex-direction: column; gap: 2px;
  }
  .temp-block .now {
    font-family: "Orbitron", monospace;
    font-size: 44px; font-weight: 700; line-height: 1;
    color: #fff;
    text-shadow: 0 0 16px rgba(0, 240, 255, 0.7);
    letter-spacing: -0.02em;
  }
  .temp-block .unit { font-size: 18px; color: #00f0ff; font-weight: 400; }
  .temp-block .desc {
    font-size: 11px; color: #88c4d9; margin-top: 4px;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .weather-icon {
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    background: radial-gradient(circle, rgba(0, 240, 255, 0.15), transparent 70%);
    border-radius: 50%;
    align-self: center; justify-self: end;
    filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.5));
  }

  /* HUD 数据网格 */
  .hud-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    padding-top: 12px;
    border-top: 1px dashed rgba(0, 240, 255, 0.2);
  }
  .hud-item {
    position: relative;
    padding: 8px 10px;
    background: rgba(0, 240, 255, 0.04);
    border: 1px solid rgba(0, 240, 255, 0.15);
    display: flex; flex-direction: column; gap: 2px;
  }
  .hud-item::before {
    content: ''; position: absolute; top: 0; left: 0; width: 8px; height: 1px;
    background: #ff00aa; box-shadow: 0 0 4px #ff00aa;
  }
  .hud-item .lbl {
    font-size: 9px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hud-item .val {
    font-size: 14px; font-weight: 600; color: #fff;
    font-family: "Orbitron", monospace;
    text-shadow: 0 0 4px rgba(0, 240, 255, 0.4);
  }
  .hud-item .val .u { font-size: 9px; color: #6b8fa3; font-weight: 400; margin-left: 2px; }

  /* 微图表行 */
  .micro-charts {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px; padding-top: 10px;
    border-top: 1px dashed rgba(0, 240, 255, 0.2);
  }
  .ring-wrap { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(0, 240, 255, 0.15); stroke-width: 3; }
  .ring-fg { fill: none; stroke: url(#cyanGrad); stroke-width: 3; stroke-linecap: round;
    filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.6));
    stroke-dasharray: 100; stroke-dashoffset: 100;
    animation: ringFill 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #fff; font-family: "Orbitron", monospace; font-weight: 600;
  }
  @keyframes ringFill { to { stroke-dashoffset: var(--target); } }
  .micro-info { flex: 1; min-width: 0; }
  .micro-info .ttl {
    font-size: 10px; color: #6b8fa3; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: "Orbitron", monospace;
  }
  .micro-info .val { font-size: 13px; color: #fff; font-weight: 600; }
  .spark { height: 24px; flex: 1; min-width: 60px; }

  /* ============================================================
     加载骨架
     ============================================================ */
  .skeleton {
    background: linear-gradient(90deg, rgba(0, 240, 255, 0.04) 0%, rgba(0, 240, 255, 0.12) 50%, rgba(0, 240, 255, 0.04) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skel-line { height: 12px; margin: 4px 0; border-radius: 2px; }
  .skel-block { border-radius: 4px; }

  /* ============================================================
     黄历模块
     ============================================================ */
  .almanac {
    margin-top: 32px;
    padding: 28px 30px;
    position: relative;
    overflow: hidden;
  }
  .almanac::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255, 0, 170, 0.1), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 240, 255, 0.1), transparent 50%);
    pointer-events: none;
  }
  .alm-head {
    display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    position: relative;
  }
  .alm-head .badge {
    padding: 4px 10px;
    font-size: 10px; font-weight: 600;
    font-family: "Orbitron", monospace; letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #04050d; background: #ff00aa;
    box-shadow: 0 0 12px rgba(255, 0, 170, 0.6);
  }
  .alm-head h2 {
    font-family: "Orbitron", "STKaiti", "KaiTi", serif;
    font-size: 24px; font-weight: 700; letter-spacing: 0.1em;
    background: linear-gradient(90deg, #00f0ff, #ff00aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .alm-head .sub {
    margin-left: auto; font-size: 11px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.1em;
  }

  .alm-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 1fr;
    gap: 20px;
    position: relative;
  }
  @media (max-width: 1100px) { .alm-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .alm-grid { grid-template-columns: 1fr; } }

  .alm-cell {
    position: relative;
    padding: 16px 18px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 240, 255, 0.2);
    transition: all 0.3s;
  }
  .alm-cell:hover {
    border-color: rgba(255, 0, 170, 0.5);
    background: rgba(255, 0, 170, 0.05);
    box-shadow: 0 0 20px rgba(255, 0, 170, 0.2);
  }
  .alm-cell::before, .alm-cell::after {
    content: ''; position: absolute; width: 8px; height: 8px;
    border: 1px solid #00f0ff;
  }
  .alm-cell::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .alm-cell::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .alm-cell .cell-label {
    font-size: 10px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .alm-cell .cell-label::before {
    content: ''; width: 6px; height: 6px;
    background: #ff00aa; box-shadow: 0 0 6px #ff00aa;
  }
  .alm-cell .cell-value {
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    font-size: 22px; font-weight: 700; color: #fff;
    text-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }
  .alm-cell .cell-sub {
    font-size: 11px; color: #88c4d9; margin-top: 4px;
    font-family: "Orbitron", monospace; letter-spacing: 0.05em;
  }

  /* 干支纪年 - 大字 */
  .alm-cell.ganzhi .cell-value {
    font-size: 36px;
    background: linear-gradient(90deg, #ff00aa, #00f0ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  /* 宜忌 */
  .yiji {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .yiji > div { padding: 12px 14px; }
  .yiji .yi { background: rgba(0, 240, 255, 0.06); border: 1px solid rgba(0, 240, 255, 0.3); }
  .yiji .ji { background: rgba(255, 0, 170, 0.06); border: 1px solid rgba(255, 0, 170, 0.3); }
  .yiji .label {
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
    font-family: "STKaiti", "KaiTi", serif;
  }
  .yiji .yi .label { color: #00f0ff; text-shadow: 0 0 6px rgba(0, 240, 255, 0.6); }
  .yiji .ji .label { color: #ff00aa; text-shadow: 0 0 6px rgba(255, 0, 170, 0.6); }
  .yiji .label::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
  }
  .yiji .yi .label::before { background: #00f0ff; box-shadow: 0 0 6px #00f0ff; }
  .yiji .ji .label::before { background: #ff00aa; box-shadow: 0 0 6px #ff00aa; }
  .yiji .items {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .yiji .items span {
    font-size: 12px; padding: 2px 8px;
    font-family: "STKaiti", "KaiTi", serif;
  }
  .yiji .yi .items span { color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
  .yiji .ji .items span { color: #ff00aa; background: rgba(255, 0, 170, 0.1); }

  /* 生肖运势 - 横向列表 */
  .shengxiao-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
  }
  @media (max-width: 640px) { .shengxiao-grid { grid-template-columns: repeat(4, 1fr); } }
  .sx-item {
    padding: 8px 4px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 240, 255, 0.2);
    text-align: center;
    transition: all 0.3s;
    cursor: default;
  }
  .sx-item:hover {

  .jieqi-display {

  }
  .jieqi-icon {
    width: 32px; height: 32px;

    box-shadow: 0 0 12px rgba(0, 240, 255, 0.6);

  .jieqi-display .jq-text {
    font-family: "STKaiti", "KaiTi", serif;

  }
  .jieqi-display .jq-days {
    font-size: 10px; color: #6b8fa3;
    font-family: "Orbitron", monospace; letter-spacing: 0.05em;
  }

  /* ============================================================
     错误提示
     ============================================================ */
  .error-banner {
    padding: 12px 16px; margin-bottom: 16px;
    background: rgba(255, 0, 170, 0.1);
    border: 1px solid rgba(255, 0, 170, 0.4);
    color: #ff80c5; font-size: 13px;
    display: none;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }
  .error-banner.show { display: block; }

  /* ============================================================
     响应式
     ============================================================ */
  @media (max-width: 900px) {
    .city-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  }
  @media (max-width: 640px) {
    .container { padding: 16px 12px 40px; }
    .city-grid { grid-template-columns: 1fr; gap: 14px; }
    .almanac { padding: 20px 16px; }
    .alm-head h2 { font-size: 18px; }
    .alm-cell .cell-value { font-size: 18px; }
    .alm-cell.ganzhi .cell-value { font-size: 28px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar-search { max-width: 100%; }
    .modal-panel { padding: 20px 18px; }
    .modal-temp { font-size: 42px; }
    .modal-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 14px 16px; }
    .brand h1 { font-size: 16px; }
  }

  /* ============================================================
     减少动画
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

const STORAGE_KEY_ADDED = 'cyberWeatherAdded';
const CITY_DB_MAP = Object.fromEntries(CITY_DB.map(c => [c.id, c]));

function loadOrder() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    const order = s ? JSON.parse(s) : DEFAULT_CITY_IDS;
    const cities = order.map(id => CITY_DB_MAP[id]).filter(Boolean);
    // 补充已添加但未在 order 中的城市
    try {
      const added = JSON.parse(localStorage.getItem(STORAGE_KEY_ADDED) || '[]');
      added.forEach(id => { if (!cities.find(c => c.id === id) && CITY_DB_MAP[id]) cities.push(CITY_DB_MAP[id]); });
    } catch {}
    return cities.length ? cities : DEFAULT_CITY_IDS.map(id => CITY_DB_MAP[id]);
  } catch {}
  return DEFAULT_CITY_IDS.map(id => CITY_DB_MAP[id]);
}
function saveOrder() {
  const order = [...$$('.city-card')].map(c => c.dataset.id);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); } catch {}
}
function saveAdded() {
  // 已添加但不在默认列表中的城市
  const added = CITIES.filter(c => !DEFAULT_CITY_IDS.includes(c.id)).map(c => c.id);

}

/* ============================================================
   数据获取 (Open-Meteo 免费 API)
   ============================================================ */
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code` +
    `&hourly=temperature_2m,precipitation_probability` +
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,weather_code` +
    `&forecast_days=7&timezone=auto`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* 模拟 AQI (Open-Meteo 免费 API 不直接提供 AQI) - 基于湿度 + 风速 + 天气码估测 */
function estimateAQI(cur, daily) {
  let base = 40 + Math.random() * 30;
  if (cur.humidity > 80) base += 20;
  if (cur.wind < 5) base += 25;
  if ([45, 48].includes(cur.code)) base += 50; // 雾
  return Math.round(Math.max(15, Math.min(280, base)));
}

async function fetchAllWeather() {
  return Promise.all(CITIES.map(c =>
    fetchWeather(c.lat, c.lon)
      .then(d => {
        const cur = d.current;
        return {
          city: c,
          data: d,
          current: {
            temp: cur.temperature_2m,
            feels: cur.apparent_temperature,
            humidity: cur.relative_humidity_2m,
            wind: cur.wind_speed_10m,
            code: cur.weather_code,
            uv: d.daily.uv_index_max?.[0] ?? 0,
          },
          daily: d.daily,
          aqi: estimateAQI(cur, d.daily),
        };
      })
      .catch(e => ({ city: c, error: e.message }))
  ));
}

function renderSparkPath(temps) {
  if (!temps.length) return '';
  const min = Math.min(...temps), max = Math.max(...temps);
  const range = (max - min) || 1;
  const w = 100, h = 24;
  const pts = temps.map((t, i) => {
    const x = (i / (temps.length - 1)) * w;
    const y = h - ((t - min) / range) * (h - 4) - 2;
    return [x, y];
  });
  const path = pts.map((p, i) => i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`).join(' ');
  const area = `${path} L${w},${h} L0,${h} Z`;
  return `<path d="${area}" fill="url(#sg)" />` +
    `<path d="${path}" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 2px #00f0ff)"/>` +
    pts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="1.5" fill="#fff" style="filter:drop-shadow(0 0 2px #00f0ff)"/>`).join('');
}

function normalize(s) { return (s || '').toLowerCase().trim(); }
function searchCities(q) {
  if (!q) return [];
  const qq = normalize(q);
  // 优先精确开头匹配 > 子串匹配, 同时支持中英文/国家/省份/别名
  const results = [];
  const lowerQQ = qq;
  for (const c of CITY_DB) {
    if (results.find(x => x.id === c.id)) continue;
    // 别名 / 别名 (例如 "NYC" -> New York, "SF" -> San Francisco, "台北" -> 台北)
    if (c.aliases && c.aliases.some(a => normalize(a) === lowerQQ || normalize(a).includes(lowerQQ))) {
      results.unshift(c); continue;
    }
    const name = normalize(c.name);
    const nameEn = normalize(c.nameEn);
    const country = normalize(c.country);
    const id = normalize(c.id);
    // 完全相等 -> 置顶
    if (name === lowerQQ || nameEn === lowerQQ || id === lowerQQ) {
      results.unshift(c);
    } else if (name.startsWith(lowerQQ) || nameEn.startsWith(lowerQQ) || id.startsWith(lowerQQ)) {
      results.push({ ...c, _prefix: true });
    } else if (name.includes(lowerQQ) || nameEn.includes(lowerQQ) || country.includes(lowerQQ) || id.includes(lowerQQ)) {
      results.push(c);
    }
    if (results.length >= 50) break;
  }
  return results.slice(0, 30);
}
function positionSearchDropdown() {
  const dd = $('#searchDropdown');
  const search = $('#citySearch');
  if (!dd || !search) return;
  const rect = search.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.width = rect.width + 'px';
  // 优先向下展开, 下方空间不够则向上
  const spaceBelow = window.innerHeight - rect.bottom;
  const ddMaxH = 360;
  if (spaceBelow >= ddMaxH + 20 || spaceBelow >= 200) {
    dd.style.top = (rect.bottom + 6) + 'px';
    dd.style.bottom = 'auto';
    dd.style.maxHeight = Math.min(ddMaxH, spaceBelow - 20) + 'px';
  } else {
    dd.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
    dd.style.top = 'auto';
    dd.style.maxHeight = Math.min(ddMaxH, rect.top - 20) + 'px';
  }
}
function renderSearchResults(results, q) {
  const dd = $('#searchDropdown');
  if (!q) { dd.classList.remove('show'); dd.innerHTML = ''; return; }
  if (!results.length) {
    dd.innerHTML = `<div class="search-empty">没有找到匹配 "${q}" 的城市</div>`;
    positionSearchDropdown();
    dd.classList.add('show');
    return;
  }
  dd.innerHTML = results.map(c => {
    const added = CITIES.some(x => x.id === c.id);
    const canAdd = !added && canAddMore();
    const disabledCls = added ? 'disabled' : (canAddMore() ? '' : 'disabled');
    const action = added ? '已添加' : (canAddMore() ? '+ 添加' : '已满');
    return `
      <div class="search-item ${disabledCls}" data-id="${c.id}">
        <span class="si-flag">${c.countryEn}</span>
        <div class="si-info">
          <div><span class="si-name">${highlight(c.name, q)}</span><span class="si-en">${highlight(c.nameEn, q)}</span></div>
          <div class="si-country">${c.country} · ${fmtNum(c.population)} 人口</div>
        </div>
        <span class="si-action">${action}</span>
      </div>
    `;
  }).join('');
  positionSearchDropdown();
  dd.classList.add('show');
  // 绑定点击
  $$('.search-item').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => addCity(el.dataset.id));
  });
}
function highlight(text, q) {
  if (!text) return '';
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.substring(0, idx) + '<mark style="background:rgba(0,240,255,0.3);color:#fff;padding:0 2px;">' + text.substring(idx, idx + q.length) + '</mark>' + text.substring(idx + q.length);
}
function fmtNum(n) {
  if (n >= 1e7) return (n / 1e7).toFixed(1) + '千万';
  if (n >= 1e4) return (n / 1e4).toFixed(1) + '万';
  return n.toLocaleString();
}

function addCity(id) {
  if (CITIES.find(c => c.id === id)) {
    showToast('该城市已添加', 'warn');
    return;
  }
  if (!canAddMore()) {
    showToast('已达到 8 个城市上限，请先移除一些城市', 'warn');
    return;
  }
  const city = CITY_DB_MAP[id];
  if (!city) {
    showToast('未找到该城市数据', 'error');
    return;
  }

  // 1. 立即更新 CITIES 数组 + localStorage (状态同步)
  CITIES = [...CITIES, city];
  saveOrder();
  saveAdded();

  // 2. 立即插入骨架卡片到 DOM, 给予 idx 标识, 关闭下拉 (乐观更新)
  const tempIdx = CITIES.length - 1;
  const skeletonId = 'skel_' + Date.now();
  insertSkeletonCard(city, tempIdx, skeletonId);
  $('#searchDropdown').classList.remove('show');
  $('#citySearch').value = '';
  $('#searchClear').style.display = 'none';
  showToast(`已添加 ${city.name}`, 'success');

  // 3. 异步获取真实数据, 替换骨架 (失败时回滚)
  fetchWeather(city.lat, city.lon).then(d => {
    const cur = d.current;
    const item = {
      city,
      current: { temp: cur.temperature_2m, feels: cur.apparent_temperature, humidity: cur.relative_humidity_2m, wind: cur.wind_speed_10m, code: cur.weather_code, uv: d.daily.uv_index_max?.[0] ?? 0 },
      daily: d.daily,
      aqi: estimateAQI(cur, d.daily),
    };
    // 缓存模态框数据
    if (modalDataCache) modalDataCache[city.id] = d;
    // 替换骨架卡片
    replaceSkeletonWithReal(skeletonId, item, tempIdx);
  }).catch(e => {
    // 回滚: 移除卡片 + 数组
    const skel = document.getElementById(skeletonId);
    if (skel) skel.remove();
    CITIES = CITIES.filter(c => c.id !== id);
    saveOrder();
    saveAdded();
    // 重新计算 idx
    $$('.city-card').forEach((c, i) => c.dataset.idx = i);
    showToast(`添加 ${city.name} 失败: ${e.message}`, 'error');
  });
}

function onDragStart(e) {
  dragSrc = this;
  const rect = this.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  // 创建自定义 ghost
  ghost = this.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.width = rect.width + 'px';
  document.body.appendChild(ghost);

  // 隐藏原生 ghost
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.dataset.id);
  try { e.dataTransfer.setDragImage(new Image(), 0, 0); } catch {}

  this.classList.add('dragging');
  $('#cityGrid').classList.add('dragging');

  // 同步 ghost 位置
  moveGhost(e);
  document.addEventListener('dragover', moveGhost);
}
function moveGhost(e) {
  if (!ghost) return;
  ghost.style.left = (e.clientX) + 'px';
  ghost.style.top = (e.clientY) + 'px';
}
function onDragEnd() {
  if (ghost) { ghost.remove(); ghost = null; }
  this.classList.remove('dragging');
  $$('.city-card').forEach(c => c.classList.remove('drag-over'));
  $('#cityGrid').classList.remove('dragging');
  document.removeEventListener('dragover', moveGhost);
}
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) {
  e.preventDefault();
  if (this === dragSrc) return;
  this.classList.add('drag-over');
}
function onDragLeave() { this.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  if (this === dragSrc) return;

  const grid = $('#cityGrid');
  const all = [...$$('.city-card')];
  const srcIdx = all.indexOf(dragSrc);
  const dstIdx = all.indexOf(this);
  if (srcIdx === -1 || dstIdx === -1) return;

  // 重新排序 DOM
  if (srcIdx < dstIdx) grid.insertBefore(dragSrc, this.nextSibling);
  else grid.insertBefore(dragSrc, this);

  // 重排 CITIES 数组以匹配 DOM
  const newOrder = [...$$('.city-card')].map(c => c.dataset.id);
  CITIES = CITIES.slice().sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
  saveOrder();
}

const HEAVENLY_STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const EARTHLY_BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ZODIAC = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const LUNAR_MONTH = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY = [
  '初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十',
];
const SOLAR_TERMS = [
  { n: '小寒', m: 1, d: 5, i: '❄' }, { n: '大寒', m: 1, d: 20, i: '❄' },
  { n: '立春', m: 2, d: 4, i: '🌱' }, { n: '雨水', m: 2, d: 19, i: '💧' },
  { n: '惊蛰', m: 3, d: 5, i: '⚡' }, { n: '春分', m: 3, d: 20, i: '🌸' },
  { n: '清明', m: 4, d: 4, i: '🌿' }, { n: '谷雨', m: 4, d: 19, i: '🌾' },
  { n: '立夏', m: 5, d: 5, i: '☀' }, { n: '小满', m: 5, d: 20, i: '🌾' },
  { n: '芒种', m: 6, d: 5, i: '🌾' }, { n: '夏至', m: 6, d: 21, i: '☀' },
  { n: '小暑', m: 7, d: 7, i: '🔥' }, { n: '大暑', m: 7, d: 22, i: '🔥' },
  { n: '立秋', m: 8, d: 7, i: '🍂' }, { n: '处暑', m: 8, d: 23, i: '🍂' },
  { n: '白露', m: 9, d: 7, i: '🌙' }, { n: '秋分', m: 9, d: 22, i: '🌕' },
  { n: '寒露', m: 10, d: 8, i: '🍁' }, { n: '霜降', m: 10, d: 23, i: '❄' },
  { n: '立冬', m: 11, d: 7, i: '❄' }, { n: '小雪', m: 11, d: 22, i: '🌨' },
  { n: '大雪', m: 12, d: 7, i: '❄' }, { n: '冬至', m: 12, d: 21, i: '☃' },
];
const WUXING = ['金','木','水','火','土']; // 简化

function lunarYearDays(y) {
  let sum = 348; // 12 * 29
  for (let i = 0x8000; i > 0x8; i >>= 1) {
    if ((LUNAR_INFO[y - 1900] & i) !== 0) sum++;
  }
  return sum + leapDays(y);
}
function leapMonth(y) { return LUNAR_INFO[y - 1900] & 0xf; }
function leapDays(y) {
  if (leapMonth(y)) return (LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29;
  return 0;
}
function monthDays(y, m) {
  return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29;
}

function solarToLunar(date) {
  // 基准: 1900-01-31 = 农历 1900-01-01
  const baseDate = new Date(1900, 0, 31);
  const offset = Math.floor((date - baseDate) / 86400000);
  let i, temp = 0;
  for (i = 1900; i < 2050 && temp + lunarYearDays(i) <= offset; i++) {
    temp += lunarYearDays(i);
  }
  const lunarYear = i;
  let lunarMonth = 1, leap = leapMonth(i);
  let isLeap = false;
  for (i = 1; i < 13 && temp < offset; i++) {
    if (leap > 0 && i === leap + 1 && !isLeap) {
      --i; isLeap = true; temp += leapDays(lunarYear);
    } else {
      temp += monthDays(lunarYear, i);
      if (isLeap && i === leap) isLeap = false;
    }
    if (temp > offset) break;
    lunarMonth = i + (isLeap ? 0 : 0);
  }
  if (temp === offset && leap > 0 && i === leap + 1) {
    if (isLeap) { isLeap = false; }
    else { isLeap = true; --i; --lunarMonth; }
  }
  const lunarDay = offset - temp + 1;
  return { year: lunarYear, month: lunarMonth, day: lunarDay, isLeap };
}

function getGanzhiYear(lunarYear) {
  // 1900 年是庚子年 (天干 6, 地支 0)
  const stemIdx = (lunarYear - 1900 + 6) % 10;
  const branchIdx = (lunarYear - 1900) % 12;
  return HEAVENLY_STEMS[stemIdx] + EARTHLY_BRANCHES[branchIdx];
}
function getZodiac(lunarYear) {
  return ZODIAC[(lunarYear - 1900) % 12];
}

function getCurrentSolarTerm(date) {
  const m = date.getMonth() + 1, d = date.getDate();
  // 找最近的节气 (向前 + 向后各一)
  let prev = SOLAR_TERMS[SOLAR_TERMS.length - 1];
  let next = SOLAR_TERMS[0];
  for (let i = 0; i < SOLAR_TERMS.length; i++) {
    const t = SOLAR_TERMS[i];
    if (t.m === m && t.d === d) return { term: t, daysToNext: 0, isExact: true };
    // 简化: 不做精确跨月比较
  }
  // 找当月及前后
  const year = date.getFullYear();
  const allTerms = [];
  for (let i = 0; i < SOLAR_TERMS.length; i++) {
    allTerms.push({ ...SOLAR_TERMS[i], date: new Date(year, SOLAR_TERMS[i].m - 1, SOLAR_TERMS[i].d) });
  }
  // 跨年: 上一个冬至
  allTerms.unshift({ ...SOLAR_TERMS[23], date: new Date(year - 1, 11, 21) });
  for (let i = 0; i < allTerms.length - 1; i++) {
    if (allTerms[i].date <= date && allTerms[i + 1].date > date) {
      const daysToNext = Math.ceil((allTerms[i + 1].date - date) / 86400000);
      const daysSince = Math.floor((date - allTerms[i].date) / 86400000);
      return { term: allTerms[i], next: allTerms[i + 1], daysSince, daysToNext };
    }
  }
  return { term: allTerms[0] };
}

/* ============================================================
   每日宜忌 / 生肖 (查表 - 用日期种子保证同一天稳定)
   ============================================================ */
const YI_POOL = ['祭祀','出行','动土','上梁','嫁娶','入宅','修造','安门','开市','交易','纳财','理发','沐浴','扫舍','教牛马','习艺','求医','治病','破屋','坏垣','分居','入殓','移柩','启攒','安葬','立碑','造庙','祈福','斋醮','酬神'];
const JI_POOL = ['嫁娶','开市','安葬','动土','破土','入宅','移徙','出火','理发','作灶','造船','掘井','栽种','牧养','祈福','求嗣','上梁','筑堤','放水','开仓','出货','纳采','问名','订盟','纳婿'];

function seededPick(arr, seed, n) {
  const result = [];
  const used = new Set();
  let s = seed;
  while (result.length < n && used.size < arr.length) {
    s = (s * 9301 + 49297) % 233280;
    const idx = Math.floor((s / 233280) * arr.length);
    if (!used.has(idx)) { used.add(idx); result.push(arr[idx]); }
  }
  return result;
}

function daySeed(date) {
  return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
}

function getYiJi(date) {
  const seed = daySeed(date);
  return {
    yi: seededPick(YI_POOL, seed, 6),
    ji: seededPick(JI_POOL, seed + 999, 5),
  };
}

function getWuxing(date) {
  const seed = daySeed(date) % 5;
  return WUXING[seed];
}

function getChongsha(date) {
  const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const dayBranchIdx = (Math.floor((date - new Date(1900, 0, 31)) / 86400000) - 11 + 1200) % 12;
  const dayBranch = branches[dayBranchIdx];
  const zodiacs = ZODIAC;
  // 冲: 地支相隔 6 位
  const oppositeIdx = (dayBranchIdx + 6) % 12;
  const oppositeZodiac = zodiacs[oppositeIdx];
  // 煞: 冲的对冲
  const shaDirs = ['北','南','东','西','中','北','南','东','西','中','北','南'];
  const shaDir = shaDirs[dayBranchIdx];
  return `冲${oppositeZodiac} · 煞${shaDir}`;
}

function getShengxiaoFortune(date) {
  const seed = daySeed(date);
  const fortunes = ['大吉','吉','中','小吉','凶'];
  return ZODIAC.map((name, i) => ({
    name,
    fortune: fortunes[Math.floor(((seed * (i + 1) * 9301 + 49297) % 233280) / 233280 * fortunes.length)],
  }));
}

   渲染: 黄历
   ============================================================ */
function renderAlmanac(date = new Date()) {
  const lunar = solarToLunar(date);
  const ganzhi = getGanzhiYear(lunar.year);
  const zodiac = getZodiac(lunar.year);
  const term = getCurrentSolarTerm(date);

  $('#almDateLabel').textContent = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
  $('#ganzhi').textContent = `${ganzhi}年`;
  $('#ganzhiAnimal').textContent = `${zodiac}年 · 农历${lunar.isLeap ? '闰' : ''}${LUNAR_MONTH[lunar.month - 1]}月${LUNAR_DAY[lunar.day - 1]}`;
  $('#lunarDate').textContent = `${lunar.isLeap ? '闰' : ''}${LUNAR_MONTH[lunar.month - 1]}月${LUNAR_DAY[lunar.day - 1]}`;
  $('#lunarMonth').textContent = `农历 · ${lunar.year}年`;
  $('#jieqiIcon').textContent = term.term.i;
  $('#jieqiName').textContent = term.term.n;
  $('#jieqiDays').textContent = term.isExact ? '今日节气' : `已过 ${term.daysSince || 0} 天 · 距下个 ${term.next?.n || '--'} ${term.daysToNext || '--'} 天`;
  $('#wuxing').textContent = getWuxing(date);
  $('#chongsha').textContent = getChongsha(date);

  const { yi, ji } = getYiJi(date);
  $('#yiList').innerHTML = yi.map(x => `<span>${x}</span>`).join('');
  $('#jiList').innerHTML = ji.map(x => `<span>${x}</span>`).join('');

  const sx = getShengxiaoFortune(date);
  $('#shengxiaoGrid').innerHTML = sx.map(s => `
    <div class="sx-item" data-luck="${s.fortune}">
      <div class="sx-name">${s.name}</div>
      <div class="sx-fortune">${s.fortune}</div>
    </div>
  `).join('');
}

/* ============================================================
   实时时钟
   ============================================================ */
function tickClock() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  $('#clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

/* ============================================================
   工具函数: querySelectorAll
   ============================================================ */
function $$(s) { return document.querySelectorAll(s); }

/* ============================================================
   主流程
   ============================================================ */
async function init() {
  tickClock();
  setInterval(tickClock, 1000);

  renderAlmanac();
  renderSkeleton();
  updateCityCount();

  $('#statusText').textContent = '正在获取数据...';

  try {
    const items = await fetchAllWeather();
    const success = items.filter(i => !i.error).length;
    if (success === 0) throw new Error('所有城市数据获取失败');
    if (success < items.length) {
      $('#errorBanner').textContent = `部分城市连接中断 (${items.length - success}/${items.length})`;
      $('#errorBanner').classList.add('show');
    }
    // 缓存天气数据供模态框使用
    modalDataCache = {};
    items.forEach(it => { if (!it.error && it.data) modalDataCache[it.city.id] = it.data; });
    renderCities(items);
    $('#statusText').textContent = `在线 · ${success} 节点`;
  } catch (e) {
    $('#errorBanner').textContent = '数据连接失败: ' + e.message;
    $('#errorBanner').classList.add('show');
    $('#statusText').textContent = '离线模式';
  }
}

/* ============================================================
   事件绑定
   ============================================================ */
function bindUI() {
  // 搜索
  const search = $('#citySearch');
  const clearBtn = $('#searchClear');
  let searchTimer = null;
  search.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = search.value.trim();
    clearBtn.style.display = q ? 'block' : 'none';
    searchTimer = setTimeout(() => renderSearchResults(searchCities(q), q), 100);
  });
  search.addEventListener('focus', () => {
    if (search.value.trim()) renderSearchResults(searchCities(search.value.trim()), search.value.trim());
  });
  clearBtn.addEventListener('click', () => {
    search.value = '';
    clearBtn.style.display = 'none';
    $('#searchDropdown').classList.remove('show');
    search.focus();
  });
  // 滚动 / 缩放时重新定位
  window.addEventListener('scroll', () => {
    if ($('#searchDropdown').classList.contains('show')) positionSearchDropdown();
  }, true);
  window.addEventListener('resize', () => {
    if ($('#searchDropdown').classList.contains('show')) positionSearchDropdown();
  });
  // 点击外部关闭下拉
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#toolbarSearch') && !e.target.closest('#searchDropdown')) {
      $('#searchDropdown').classList.remove('show');
    }
  });
  // 键盘: ESC 关闭
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if ($('#cityModal').classList.contains('show')) closeCityModal();
      $('#searchDropdown').classList.remove('show');
    }
  });
  // 模态框关闭
  $('#modalClose').addEventListener('click', closeCityModal);
  $('#cityModal').addEventListener('click', (e) => {
    if (e.target.id === 'cityModal') closeCityModal();
  });
  // 模态框内移除
  $('#modalRemove').addEventListener('click', () => {
    if (modalCityIdx < 0) return;
    const id = CITIES[modalCityIdx]?.id;
    if (id) {
      closeCityModal();
      setTimeout(() => removeCity(id), 200);
    }
  });
}
bindUI();

/* 工具栏按钮 */
$('#refreshBtn').addEventListener('click', () => {
  $('#refreshBtn').classList.add('active');
  init().then(() => setTimeout(() => $('#refreshBtn').classList.remove('active'), 600));
});
$('#resetBtn').addEventListener('click', () => {
  if (confirm('确认恢复默认排序?')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

/* ============================================================
   主题切换 (赛博朋克 ↔ iOS UI)
   ============================================================ */
const THEME_KEY = 'cyberWeatherTheme';
function applyTheme(theme) {
  document.body.classList.toggle('theme-ios', theme === 'ios');
  document.documentElement.style.colorScheme = theme === 'ios' ? 'light' : 'dark';
  $('#themeToggle').setAttribute('aria-label', theme === 'ios' ? '切换到赛博朋克风格' : '切换到 iOS 风格');
  $('#themeToggle').title = theme === 'ios' ? '切换到赛博朋克' : '切换到 iOS';
}
function toggleTheme() {
  const cur = document.body.classList.contains('theme-ios') ? 'ios' : 'cyber';
  const next = cur === 'ios' ? 'cyber' : 'ios';
  applyTheme(next);
  try { localStorage.setItem(THEME_KEY, next); } catch {}
  // 重新渲染 sparkline 渐变 ID 避免冲突
  $$('.spark defs linearGradient').forEach((g, i) => g.id = 'sg_' + Date.now() + '_' + i);
  $$('.spark path').forEach((p, i) => { const id = p.getAttribute('fill'); });
}
$('#themeToggle').addEventListener('click', toggleTheme);
// 恢复上次的偏好
try {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
} catch {}

document.addEventListener('DOMContentLoaded', init);
</script>
